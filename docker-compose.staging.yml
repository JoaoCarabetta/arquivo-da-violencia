# =============================================================================
# Arquivo da Violência - Staging Docker Compose Overlay
# =============================================================================
#
# Usage (always use with base docker-compose.yml):
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml logs -f
#
# This overlay:
#   - Uses different container names (staging-arquivo-*)
#   - Uses different ports (8080 for frontend, 8001 for API, 6380 for Redis)
#   - Uses a separate Redis volume; Postgres is shared with production
#   - Configures staging-specific environment variables
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - shared prod instance (arquivo-postgres); do not start a second
  # container on the same data volume.
  # ---------------------------------------------------------------------------
  postgres:
    profiles: ["disabled"]
    volumes: !override []

  # ---------------------------------------------------------------------------
  # Redis - Staging instance on port 6380
  # ---------------------------------------------------------------------------
  redis:
    container_name: staging-arquivo-redis
    ports: !override
      - "6380:6379"
    volumes:
      - staging_redis_data:/data

  # ---------------------------------------------------------------------------
  # API - Staging instance on port 8001
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/backend:develop
    container_name: staging-arquivo-api
    env_file:
      - .env
    depends_on: !override
      redis:
        condition: service_healthy
    networks:
      - default
      - prod
    ports: !override
      - "8001:8000"
    environment: !override
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD}@arquivo-postgres:5432/arquivo_staging
      - DB_POOL_SIZE=5
      - DB_POOL_OVERFLOW=5
      - OPENROUTER_API_KEY=${STAGING_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
      - EXTRACTION_MODEL=${STAGING_EXTRACTION_MODEL:-${EXTRACTION_MODEL:-deepseek/deepseek-v4-flash}}
      - SELECTION_MODEL=${STAGING_SELECTION_MODEL:-${SELECTION_MODEL:-openai/gpt-oss-120b}}
      - CONTENT_GATE_MODEL=${STAGING_CONTENT_GATE_MODEL:-${CONTENT_GATE_MODEL:-google/gemini-2.5-flash-lite}}
      - DEDUP_MODEL=${STAGING_DEDUP_MODEL:-${DEDUP_MODEL:-google/gemini-3.1-flash-lite}}
      - ENRICHMENT_MODEL=${STAGING_ENRICHMENT_MODEL:-${ENRICHMENT_MODEL:-deepseek/deepseek-v4-flash}}
      - DEBUG=true
      - ENVIRONMENT=staging
      - ENABLE_AUTH=true
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:8080","https://staging.arquivodaviolencia.com.br"]
      - JWT_SECRET_KEY=${STAGING_JWT_SECRET_KEY}
      - ADMIN_USERNAME=${STAGING_ADMIN_USERNAME:-admin}
      - TELEGRAM_BOT_TOKEN=${STAGING_TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${STAGING_TELEGRAM_CHAT_ID:-}

  # ---------------------------------------------------------------------------
  # Worker - Staging instance
  # ---------------------------------------------------------------------------
  worker:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/backend:develop
    container_name: staging-arquivo-worker
    env_file:
      - .env
    depends_on: !override
      redis:
        condition: service_healthy
    networks:
      - default
      - prod
    environment: !override
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD}@arquivo-postgres:5432/arquivo_staging
      - DB_POOL_SIZE=15
      - DB_POOL_OVERFLOW=15
      - OPENROUTER_API_KEY=${STAGING_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
      - EXTRACTION_MODEL=${STAGING_EXTRACTION_MODEL:-${EXTRACTION_MODEL:-deepseek/deepseek-v4-flash}}
      - SELECTION_MODEL=${STAGING_SELECTION_MODEL:-${SELECTION_MODEL:-openai/gpt-oss-120b}}
      - CONTENT_GATE_MODEL=${STAGING_CONTENT_GATE_MODEL:-${CONTENT_GATE_MODEL:-google/gemini-2.5-flash-lite}}
      - DEDUP_MODEL=${STAGING_DEDUP_MODEL:-${DEDUP_MODEL:-google/gemini-3.1-flash-lite}}
      - ENRICHMENT_MODEL=${STAGING_ENRICHMENT_MODEL:-${ENRICHMENT_MODEL:-deepseek/deepseek-v4-flash}}
      - ENABLE_CRON=${STAGING_ENABLE_CRON:-false}
      - ENVIRONMENT=staging
      - ENABLE_AUTH=true
      - JWT_SECRET_KEY=${STAGING_JWT_SECRET_KEY}
      - ADMIN_USERNAME=${STAGING_ADMIN_USERNAME:-admin}
      - TELEGRAM_BOT_TOKEN=${STAGING_TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${STAGING_TELEGRAM_CHAT_ID:-}
    # Allow worker 120s to finish current job before forced shutdown
    stop_grace_period: 120s

  # ---------------------------------------------------------------------------
  # Frontend - Staging instance on port 8080 (SSL terminated by host nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/frontend:develop
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NGINX_CONF=nginx.staging.conf
    container_name: staging-arquivo-frontend
    ports: !override
      - "8080:80"

networks:
  prod:
    external: true
    name: prod_default

volumes:
  staging_redis_data:
    external: true
    name: staging-arquivo-redis-data

