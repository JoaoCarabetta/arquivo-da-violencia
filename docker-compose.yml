# =============================================================================
# Arquivo da Violência - Production Docker Compose
# =============================================================================
#
# Usage:
#   docker compose -p prod up -d              # Start all services
#   docker compose -p prod up -d api worker   # Start API and worker only
#   docker compose -p prod logs -f worker     # Follow worker logs
#   docker compose -p prod exec api alembic upgrade head  # Run migrations
#
# Environment variables (create .env file):
#   OPENROUTER_API_KEY=your-api-key
#   ENABLE_CRON=true  # Enable hourly ingestion
#   TELEGRAM_BOT_TOKEN=your-bot-token  # For notifications
#   TELEGRAM_CHAT_ID=your-chat-id
#   GITHUB_TOKEN=your-github-token  # For creating issues on failures
#   GITHUB_REPO=owner/repo  # Repository for issues
#   POSTGRES_PASSWORD=strong-password  # PostgreSQL password
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Primary application database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: arquivo-postgres
    environment:
      POSTGRES_USER: arquivo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: arquivo_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquivo -d arquivo_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - Task queue and caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arquivo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API - FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/backend:master
    build: ./backend
    container_name: arquivo-api
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD}@postgres:5432/arquivo_prod
      - DB_POOL_SIZE=5
      - DB_POOL_OVERFLOW=5
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-deepseek/deepseek-v4-flash}
      - SELECTION_MODEL=${SELECTION_MODEL:-openai/gpt-oss-120b}
      - CONTENT_GATE_MODEL=${CONTENT_GATE_MODEL:-google/gemini-2.5-flash-lite}
      - DEDUP_MODEL=${DEDUP_MODEL:-google/gemini-3.1-flash-lite}
      - ENRICHMENT_MODEL=${ENRICHMENT_MODEL:-deepseek/deepseek-v4-flash}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=production
      - ENABLE_AUTH=true
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:80","https://arquivodaviolencia.com.br","https://www.arquivodaviolencia.com.br"]
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERS=${ADMIN_USERS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Worker - ARQ background task processor
  # ---------------------------------------------------------------------------
  worker:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/backend:master
    build: ./backend
    container_name: arquivo-worker
    command: arq app.tasks.worker.WorkerSettings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD}@postgres:5432/arquivo_prod
      - DB_POOL_SIZE=15
      - DB_POOL_OVERFLOW=15
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-deepseek/deepseek-v4-flash}
      - SELECTION_MODEL=${SELECTION_MODEL:-openai/gpt-oss-120b}
      - CONTENT_GATE_MODEL=${CONTENT_GATE_MODEL:-google/gemini-2.5-flash-lite}
      - DEDUP_MODEL=${DEDUP_MODEL:-google/gemini-3.1-flash-lite}
      - ENRICHMENT_MODEL=${ENRICHMENT_MODEL:-deepseek/deepseek-v4-flash}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - ENABLE_CRON=${ENABLE_CRON:-false}
      - ENVIRONMENT=production
      - ENABLE_AUTH=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERS=${ADMIN_USERS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0 if __import__(\"pathlib\").Path(\"/proc/1\").exists() else 1)'"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Allow worker 120s to finish current job before forced shutdown
    stop_grace_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend - React Vite app (production build)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/joaocarabetta/arquivo-da-violencia/frontend:master
    build:
      context: ./frontend
    container_name: arquivo-frontend
    ports:
      - "9080:80"
    depends_on:
      - api
    restart: unless-stopped
    # Optional: Enable watch mode for automatic rebuilds
    # Run: docker compose watch
    # develop:
    #   watch:
    #     - action: rebuild
    #       path: ./frontend
    #       ignore:
    #         - node_modules/
    #         - dist/
    #         - .git/

volumes:
  postgres_data:
    name: arquivo-postgres-data
  redis_data:
    name: arquivo-redis-data
