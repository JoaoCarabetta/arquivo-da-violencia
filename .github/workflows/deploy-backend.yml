# =============================================================================
# Backend Deployment Workflow
# =============================================================================
# Triggers on backend or deploy-infra changes on master/develop.
# - master: production deploy, then prod → staging DB sync
# - develop: staging deploy only
# =============================================================================

name: Deploy Backend

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'docker-compose.yml'
      - 'docker-compose.staging.yml'
      - 'scripts/deploy-backend.sh'
      - 'scripts/sync-staging-db.sh'
      - 'scripts/hash-env-passwords.py'
      - 'scripts/lib/**'
      - 'infra/postgres/**'
      - 'infra/nginx/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/arquivo-da-violencia
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            docker logout ghcr.io 2>/dev/null || true
            bash scripts/deploy-backend.sh staging

      - name: Update host nginx config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/arquivo-da-violencia
            cp infra/nginx/arquivo-violencia.conf /etc/nginx/sites-available/arquivo-violencia
            ln -sf /etc/nginx/sites-available/arquivo-violencia /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx || systemctl start nginx
            echo "✅ Host nginx config updated"

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/arquivo-da-violencia
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            docker logout ghcr.io 2>/dev/null || true
            bash scripts/deploy-backend.sh production

      - name: Update host nginx config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/arquivo-da-violencia
            cp infra/nginx/arquivo-violencia.conf /etc/nginx/sites-available/arquivo-violencia
            ln -sf /etc/nginx/sites-available/arquivo-violencia /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx || systemctl start nginx
            echo "✅ Host nginx config updated"

  sync-staging-db:
    name: Sync Production DB to Staging
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Sync database to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/arquivo-da-violencia
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            bash scripts/sync-staging-db.sh
