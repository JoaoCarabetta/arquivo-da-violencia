# One-shot: enqueue ingest only (no worker restart).
# Remove before merging to develop.
name: Pipeline Enqueue Ingest Once

on:
  push:
    branches:
      - cursor/pipeline-auto-remediation-5a92
    paths:
      - ".github/workflows/pipeline-enqueue-ingest-once.yml"
      - "scripts/check-pipeline-health.sh"

jobs:
  enqueue-ingest:
    name: Enqueue ingest without restart
    runs-on: ubuntu-latest
    steps:
      - name: SSH enqueue ingest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /root/arquivo-da-violencia
            BRANCH="cursor/pipeline-auto-remediation-5a92"
            git fetch origin "$BRANCH"
            git checkout -f "$BRANCH"
            git reset --hard "origin/$BRANCH"
            echo "=== pre heartbeat / queue ==="
            docker compose -p prod exec -T redis redis-cli GET arquivo:production:health-check || true
            docker compose -p prod exec -T redis redis-cli ZCARD arquivo:production || true
            docker ps --filter name=arquivo-worker --format 'table {{.Names}}\t{{.Status}}'
            echo "=== enqueue ingest_cities_full_pipeline only ==="
            cat >/tmp/enqueue_ingest.py <<'PY'
            import asyncio
            from app.tasks.worker import create_arq_pool

            async def main():
                redis = await create_arq_pool()
                job = await redis.enqueue_job("ingest_cities_full_pipeline", None, "1h")
                print(f"enqueued job_id={job.job_id}")
                await redis.aclose()

            asyncio.run(main())
            PY
            # Strip leading spaces that YAML/heredoc may leave
            sed -i 's/^[[:space:]]*//' /tmp/enqueue_ingest.py
            docker compose -p prod cp /tmp/enqueue_ingest.py api:/tmp/enqueue_ingest.py
            docker compose -p prod exec -T api python /tmp/enqueue_ingest.py
            sleep 30
            echo "=== post heartbeat / queue ==="
            docker compose -p prod exec -T redis redis-cli GET arquivo:production:health-check || true
            docker compose -p prod exec -T redis redis-cli ZCARD arquivo:production || true
            echo "=== health json (no remediate, no notify) ==="
            bash scripts/check-pipeline-health.sh --json || true
            echo "=== recent worker lines ==="
            docker logs arquivo-worker --since 2m 2>&1 | tail -40 || true
            git fetch origin master
            git checkout -f master
            git reset --hard origin/master
