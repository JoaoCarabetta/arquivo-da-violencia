# One-shot: enqueue ingest only (no worker restart).
# Remove before merging to develop (along with scripts/enqueue_ingest_once.py).
name: Pipeline Enqueue Ingest Once

on:
  push:
    branches:
      - cursor/pipeline-auto-remediation-5a92
    paths:
      - ".github/workflows/pipeline-enqueue-ingest-once.yml"
      - "scripts/enqueue_ingest_once.py"

jobs:
  enqueue-ingest:
    name: Enqueue ingest without restart
    runs-on: ubuntu-latest
    steps:
      - name: SSH enqueue ingest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /root/arquivo-da-violencia
            BRANCH="cursor/pipeline-auto-remediation-5a92"
            git fetch origin "$BRANCH"
            git checkout -f "$BRANCH"
            git reset --hard "origin/$BRANCH"
            echo "=== pre heartbeat / queue ==="
            docker compose -p prod exec -T redis redis-cli GET arquivo:production:health-check || true
            docker compose -p prod exec -T redis redis-cli ZCARD arquivo:production || true
            docker ps --filter name=arquivo-worker --format 'table {{.Names}}\t{{.Status}}'
            echo "=== enqueue ingest_cities_full_pipeline only ==="
            # Must live under /app so `import app` resolves (python /tmp/... puts /tmp on sys.path).
            docker compose -p prod cp scripts/enqueue_ingest_once.py api:/app/enqueue_ingest_once.py
            docker compose -p prod exec -T api python /app/enqueue_ingest_once.py
            sleep 75
            echo "=== post heartbeat / queue ==="
            docker compose -p prod exec -T redis redis-cli GET arquivo:production:health-check || true
            docker compose -p prod exec -T redis redis-cli ZCARD arquivo:production || true
            echo "=== health json (no remediate, no notify) ==="
            bash scripts/check-pipeline-health.sh --json || true
            echo "=== recent worker lines ==="
            docker logs arquivo-worker --since 3m 2>&1 | tail -60 || true
            git fetch origin master
            git checkout -f master
            git reset --hard origin/master
