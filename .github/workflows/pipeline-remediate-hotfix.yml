# One-shot: run fixed Tier-A remediator on prod from this branch (SSH via deploy secrets).
name: Pipeline Remediate Hotfix

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - pipeline-remediate-hotfix
  push:
    branches:
      - cursor/pipeline-auto-remediation-d739
    paths:
      - .github/workflows/pipeline-remediate-hotfix.yml
      - scripts/check-pipeline-health.sh

jobs:
  remediate-prod:
    name: Run fixed health remediator on VPS
    runs-on: ubuntu-latest
    steps:
      - name: SSH and remediate with branch script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/arquivo-da-violencia
            git fetch origin cursor/pipeline-auto-remediation-d739 master
            # Overlay fixed script into working tree (keeps scripts/lib path working).
            git checkout -f origin/cursor/pipeline-auto-remediation-d739 -- scripts/check-pipeline-health.sh
            # No --notify: avoid Cursor webhook feedback loops while remediating.
            set +e
            bash scripts/check-pipeline-health.sh --remediate --json
            HEALTH_EXIT=$?
            set -e
            echo "=== Post-remediate wait (45s) for ingest start / heartbeat ==="
            sleep 45
            set +e
            bash scripts/check-pipeline-health.sh --json
            HEALTH_EXIT=$?
            set -e
            echo "=== Worker logs (last 2h, tail 80) ==="
            docker logs arquivo-worker --since 2h 2>&1 | tail -80 || true
            echo "=== pipeline_attempt failures (last 2h) ==="
            docker compose -p prod exec -T postgres psql -U arquivo -d arquivo_prod -c "
              SELECT stage, failure_reason, COUNT(*)
              FROM pipeline_attempt
              WHERE created_at > now() - interval '2 hours' AND outcome = 'failure'
              GROUP BY 1,2 ORDER BY 3 DESC LIMIT 10;
            " || true
            git checkout -f master
            git reset --hard origin/master
            exit "$HEALTH_EXIT"
