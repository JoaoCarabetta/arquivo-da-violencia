# One-shot: single clean worker restart + health dump (no notify storm).
# Remove before merging to develop.
name: Pipeline Worker Restart Once

on:
  push:
    branches:
      - cursor/pipeline-auto-remediation-5a92
    paths:
      - ".github/workflows/pipeline-worker-restart-once.yml"
      - "scripts/check-pipeline-health.sh"

jobs:
  restart-worker:
    name: Clean worker restart on prod
    runs-on: ubuntu-latest
    steps:
      - name: SSH restart and diagnose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/arquivo-da-violencia
            BRANCH="cursor/pipeline-auto-remediation-5a92"
            git fetch origin "$BRANCH"
            git checkout -f "$BRANCH"
            git reset --hard "origin/$BRANCH"
            echo "=== docker ps worker ==="
            docker ps --filter name=arquivo-worker --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo "=== restart worker once ==="
            docker compose -p prod restart worker
            sleep 20
            echo "=== heartbeat ==="
            docker compose -p prod exec -T redis redis-cli GET arq:queue:health-check || true
            docker compose -p prod exec -T redis redis-cli GET arq:worker:info || true
            echo "=== queue depth ==="
            docker compose -p prod exec -T redis redis-cli ZCARD arq:queue || true
            echo "=== worker logs since restart ==="
            docker logs arquivo-worker --since 3m 2>&1 | tail -100 || true
            echo "=== health json (no notify) ==="
            bash scripts/check-pipeline-health.sh --remediate --json || true
            echo "=== post-remediate heartbeat ==="
            docker compose -p prod exec -T redis redis-cli GET arq:queue:health-check || true
            git fetch origin master
            git checkout -f master
            git reset --hard origin/master
