# =============================================================================
# Production Pipeline Health Check
# =============================================================================
# SSH to the VPS every 30 minutes and run scripts/check-pipeline-health.sh.
# On failure the script notifies Telegram (from VPS .env) and an optional
# PIPELINE_HEALTH_WEBHOOK_URL (e.g. Cursor Automation).
# =============================================================================

name: Pipeline Health

on:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types:
      - pipeline-remediate
      - pipeline-diagnose
  workflow_dispatch:
    inputs:
      remediate:
        description: 'Run Tier-A remediation (stuck sources, missing pipeline, worker restart)'
        required: false
        default: false
        type: boolean
      diagnose:
        description: 'Print worker/API logs and pipeline_attempt failures on unhealthy check'
        required: false
        default: false
        type: boolean
      test_webhook:
        description: 'POST test payload to Cursor Automation webhook after the check'
        required: false
        default: false
        type: boolean

concurrency:
  # Prevent parallel remediates from restart-thrashing the worker.
  group: pipeline-health-prod
  cancel-in-progress: true

jobs:
  check-production:
    name: Check prod pipeline on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout health script
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/check-pipeline-health.sh
          sparse-checkout-cone-mode: false

      - name: Sync check script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "scripts/check-pipeline-health.sh"
          target: "/root/arquivo-da-violencia"
          overwrite: true

      - name: Run health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Keep going after health exit 1 so diagnose logs still print.
          script_stop: false
          command_timeout: 15m
          script: |
            set -uo pipefail
            cd /root/arquivo-da-violencia
            export PIPELINE_HEALTH_WEBHOOK_AUTH="${{ secrets.CURSOR_AUTOMATION_TOKEN }}"
            ARGS="--json"
            EVENT="${{ github.event_name }}"
            DISPATCH_ACTION="${{ github.event.action }}"
            # Notify only on schedule / manual runs. repository_dispatch is
            # already driven by the Cursor agent webhook — re-notifying creates
            # an agent → remediate → notify → agent feedback loop.
            if [ "$EVENT" = "schedule" ] \
              || [ "$EVENT" = "workflow_dispatch" ]; then
              ARGS="$ARGS --notify"
            fi
            # Tier-A auto-remediation: safe for scheduled checks and on-demand dispatch.
            if [ "$EVENT" = "schedule" ] \
              || { [ "$EVENT" = "repository_dispatch" ] && [ "$DISPATCH_ACTION" = "pipeline-remediate" ]; } \
              || { [ "$EVENT" = "workflow_dispatch" ] && [ "${{ inputs.remediate }}" = "true" ]; }; then
              ARGS="$ARGS --remediate"
            fi
            if [ "$EVENT" = "workflow_dispatch" ] && [ "${{ inputs.test_webhook }}" = "true" ]; then
              ARGS="$ARGS --test-webhook"
            fi
            set +e
            bash scripts/check-pipeline-health.sh $ARGS
            HEALTH_EXIT=$?
            set -e
            if [ "$HEALTH_EXIT" -ne 0 ]; then
              SHOULD_DIAGNOSE=false
              if [ "$EVENT" = "workflow_dispatch" ] && [ "${{ inputs.diagnose }}" = "true" ]; then
                SHOULD_DIAGNOSE=true
              fi
              if [ "$EVENT" = "repository_dispatch" ] && [ "$DISPATCH_ACTION" = "pipeline-diagnose" ]; then
                SHOULD_DIAGNOSE=true
              fi
              if [ "$SHOULD_DIAGNOSE" = true ]; then
                echo "=== Worker logs (last 2h, tail 150) ==="
                docker logs arquivo-worker --since 2h 2>&1 | tail -150 || true
                echo "=== API errors (last 2h) ==="
                docker logs arquivo-api --since 2h 2>&1 | grep -i error | tail -30 || true
                echo "=== pipeline_attempt failures (last 2h) ==="
                docker compose -p prod exec -T postgres psql -U arquivo -d arquivo_prod -c "
                  SELECT stage, failure_reason, COUNT(*)
                  FROM pipeline_attempt
                  WHERE created_at > now() - interval '2 hours' AND outcome = 'failure'
                  GROUP BY 1,2 ORDER BY 3 DESC LIMIT 10;
                " || true
              fi
              exit "$HEALTH_EXIT"
            fi

      - name: Summarize failure in GitHub Actions
        if: failure()
        run: |
          echo "::error::Production pipeline health check failed on VPS."
          echo "Inspect Telegram alert or SSH: bash scripts/check-pipeline-health.sh"
