# =============================================================================
# Production Pipeline Health Check
# =============================================================================
# SSH to the VPS every 30 minutes and run scripts/check-pipeline-health.sh.
# On failure the script notifies Telegram (from VPS .env) and an optional
# PIPELINE_HEALTH_WEBHOOK_URL (e.g. Cursor Automation).
# =============================================================================

name: Pipeline Health

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      remediate:
        description: 'Run Tier-A remediation (stuck sources, missing pipeline, worker restart)'
        required: false
        default: false
        type: boolean
      diagnose:
        description: 'Print worker/API logs and pipeline_attempt failures on unhealthy check'
        required: false
        default: false
        type: boolean
      test_webhook:
        description: 'POST test payload to Cursor Automation webhook after the check'
        required: false
        default: false
        type: boolean

jobs:
  check-production:
    name: Check prod pipeline on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Sync check script and run health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/arquivo-da-violencia
            BRANCH="master"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              BRANCH="${{ github.ref_name }}"
            fi
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            export PIPELINE_HEALTH_WEBHOOK_AUTH="${{ secrets.CURSOR_AUTOMATION_TOKEN }}"
            ARGS="--notify"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.remediate }}" = "true" ]; then
              ARGS="$ARGS --remediate"
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_webhook }}" = "true" ]; then
              ARGS="$ARGS --test-webhook"
            fi
            set +e
            bash scripts/check-pipeline-health.sh $ARGS
            HEALTH_EXIT=$?
            set -e
            if [ "$HEALTH_EXIT" -ne 0 ]; then
              if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.diagnose }}" = "true" ]; then
                echo "=== Worker logs (last 2h, tail 150) ==="
                docker logs arquivo-worker --since 2h 2>&1 | tail -150 || true
                echo "=== API errors (last 2h) ==="
                docker logs arquivo-api --since 2h 2>&1 | grep -i error | tail -30 || true
                echo "=== pipeline_attempt failures (last 2h) ==="
                docker compose -p prod exec -T postgres psql -U arquivo -d arquivo_prod -c "
                  SELECT stage, failure_reason, COUNT(*)
                  FROM pipeline_attempt
                  WHERE created_at > now() - interval '2 hours' AND outcome = 'failure'
                  GROUP BY 1,2 ORDER BY 3 DESC LIMIT 10;
                " || true
              fi
              exit "$HEALTH_EXIT"
            fi

      - name: Summarize failure in GitHub Actions
        if: failure()
        run: |
          echo "::error::Production pipeline health check failed on VPS."
          echo "Inspect Telegram alert or SSH: bash scripts/check-pipeline-health.sh"
