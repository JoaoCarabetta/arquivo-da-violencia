services:
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: obs-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - obs

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: obs-prometheus
    restart: unless-stopped
    depends_on:
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - obs

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: obs-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    networks:
      - obs

  alert-router:
    build: ./alert-router
    container_name: obs-alert-router
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GRAFANA_URL=${GRAFANA_ROOT_URL:-https://observability.carabetta.xyz}
    networks:
      - obs

  grafana:
    image: grafana/grafana:11.5.2
    container_name: obs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-observability.carabetta.xyz}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://observability.carabetta.xyz}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - obs

networks:
  obs:

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
