global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: arquivo-prod-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["77.42.72.111:8000"]
        labels:
          environment: production
          service: api

  - job_name: arquivo-prod-worker
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["77.42.72.111:9091"]
        labels:
          environment: production
          service: worker

  - job_name: arquivo-prod-node
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["77.42.72.111:9100"]
        labels:
          environment: production
          host: prod

  - job_name: obs-node
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          environment: observability
          host: obs
