# =============================================================================
# Arquivo da Violência - Development Docker Compose
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml down
#
# Features:
#   - No authentication required (no password)
#   - Frontend hot-reload enabled
#   - No cron/scheduled jobs
#   - Development-friendly settings
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Development database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: arquivo-postgres-dev
    environment:
      POSTGRES_USER: arquivo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arquivo_dev}
      POSTGRES_DB: arquivo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquivo -d arquivo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - Task queue and caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arquivo-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API - FastAPI backend (with volume mount for hot-reload)
  # ---------------------------------------------------------------------------
  api:
    build: ./backend
    container_name: arquivo-api-dev
    ports:
      - "8010:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD:-arquivo_dev}@postgres:5432/arquivo_dev}
      - DB_POOL_SIZE=5
      - DB_POOL_OVERFLOW=5
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEBUG=true
      - ENVIRONMENT=development
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:80","http://localhost"]
      - JWT_SECRET_KEY=dev-secret-key-not-for-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=
      - ENABLE_AUTH=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Worker - ARQ background task processor (NO CRON in dev)
  # ---------------------------------------------------------------------------
  worker:
    build: ./backend
    container_name: arquivo-worker-dev
    command: arq app.tasks.worker.WorkerSettings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://arquivo:${POSTGRES_PASSWORD:-arquivo_dev}@postgres:5432/arquivo_dev}
      - DB_POOL_SIZE=15
      - DB_POOL_OVERFLOW=15
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ENABLE_CRON=false
      - DEBUG=true
      - JWT_SECRET_KEY=dev-secret-key-not-for-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./backend/app:/app/app:ro
    stop_grace_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend - React Vite dev server with hot-reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: arquivo-frontend-dev
    ports:
      - "80:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_PROXY=http://api:8000
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./frontend/components.json:/app/components.json:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_dev_data:
    name: arquivo-postgres-dev-data
  redis_dev_data:
    name: arquivo-redis-dev-data
